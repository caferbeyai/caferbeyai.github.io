<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Caferbey's Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: light dark; --bg:#0f1117; --card:#161925; --text:#e8ecf3; --muted:#98a2b3; --accent:#7dd3fc; --border:#1f2433; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Inter', system-ui, -apple-system, sans-serif; background:#0f1117; color:var(--text); min-height:100vh; padding:32px 16px 64px; display:flex; justify-content:center; }
    .shell { width:min(760px,100%); }
    h1 { margin:0 0 24px; letter-spacing:-0.02em; }
    a { color:var(--accent); }
    a.card { display:block; text-decoration:none; color:inherit; }
    .card { background:rgba(22,25,37,0.9); border:1px solid var(--border); border-radius:16px; padding:18px; box-shadow:0 16px 40px rgba(0,0,0,0.24); line-height:1.6; margin-bottom:16px; transition:transform 0.2s; }
    a.card:hover { transform:translateY(-2px); }
    .card h3 { margin:0 0 8px; }
    .card p { margin:0 0 8px; color:var(--muted); }
    .card .read-more { color:var(--accent); }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Caferbey's Blog</h1>

    </a>

      <p class="read-more">Read →</p>
    </a>
  </div>
</body>
</html>
